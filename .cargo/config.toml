# Workspace-level Cargo config.
# All members default to the bare-metal x86_64 target used by crusty_os.
# Per-crate configs (crusty_os/.cargo/config.toml) shadow these for their crate.

[alias]
xtask = [
        "run",
        "--manifest-path",
        "xtask/Cargo.toml",
        "--config",
        "build.target=\"aarch64-apple-darwin\"",
        "--"
        ]

[build]
target = "crusty_os/x86_64-crusty_os.json"

[unstable]
json-target-spec = true
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]

[target.x86_64-crusty_os]
runner = "/bin/bash test-runner.sh"

